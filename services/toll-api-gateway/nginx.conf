# NGINX configuration for Smart Toll Cache System
# Reverse proxy and load balancer for rodovia backend instances

upstream rodovia_backend {
    # Load balancing algorithm: round-robin (default)
    server rodovia-1:9080;
    server rodovia-2:9080;
    server rodovia-3:9080;
}

server {
    listen 80;
    server_name localhost;

    # API requests — proxy to rodovia backend instances
    location /api/ {
        proxy_pass http://rodovia_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Frontend — proxy to React container
    location / {
        proxy_pass http://toll-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
