# Smart Toll Cache System — Test Environment
# Docker Compose for running integration and E2E tests

version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=rodovia_test
      - POSTGRES_USER=rodovia_user
      - POSTGRES_PASSWORD=rodovia_pass
    ports:
      - "5433:5432"
    volumes:
      - ../infrastructure/init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-test:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper-test
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-test:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  rodovia-test:
    build:
      context: ../services/rodovia
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-test:5432/rodovia_test
      - SPRING_DATASOURCE_USERNAME=rodovia_user
      - SPRING_DATASOURCE_PASSWORD=rodovia_pass
      - SPRING_DATA_REDIS_HOST=redis-test
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka-test:9092
      - SERVER_PORT=9080
    depends_on:
      - postgres-test
      - redis-test
      - kafka-test
