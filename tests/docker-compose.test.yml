# Smart Toll Cache System — Test Environment
# Docker Compose for running integration and E2E tests

version: '3.8'

services:
  postgres-test:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=tolldb_test
      - POSTGRES_USER=tolluser
      - POSTGRES_PASSWORD=tollpass
    ports:
      - "5433:5432"
    volumes:
      - ../infrastructure/init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  toll-service-test:
    build:
      context: ../services/toll-management-service-java
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=test
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-test:5432/tolldb_test
      - SPRING_REDIS_HOST=redis-test
      - SPRING_REDIS_PORT=6379
    depends_on:
      - postgres-test
      - redis-test
