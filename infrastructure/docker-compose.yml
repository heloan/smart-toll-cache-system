# Smart Toll Cache System — Docker Compose
# Full stack orchestration for development environment

version: '3.8'

services:
  # --- API Gateway / Load Balancer ---
  nginx:
    build:
      context: ../services/toll-api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - rodovia-1
      - rodovia-2
      - rodovia-3
    networks:
      - toll-network

  # --- Backend Instances (Spring Boot — Rodovia Service) ---
  rodovia-1:
    build:
      context: ../services/rodovia
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rodovia
      - SPRING_DATASOURCE_USERNAME=rodovia_user
      - SPRING_DATASOURCE_PASSWORD=rodovia_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=9080
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - toll-network

  rodovia-2:
    build:
      context: ../services/rodovia
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rodovia
      - SPRING_DATASOURCE_USERNAME=rodovia_user
      - SPRING_DATASOURCE_PASSWORD=rodovia_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=9080
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - toll-network

  rodovia-3:
    build:
      context: ../services/rodovia
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rodovia
      - SPRING_DATASOURCE_USERNAME=rodovia_user
      - SPRING_DATASOURCE_PASSWORD=rodovia_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVER_PORT=9080
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - toll-network

  # --- Frontend (React) ---
  toll-frontend:
    build:
      context: ../services/toll-frontend-react
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - nginx
    networks:
      - toll-network

  # --- Toll Transaction Simulator (Python) ---
  simulador:
    build:
      context: ../services/simulador
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=transacao-pedagio
    depends_on:
      - kafka
    networks:
      - toll-network

  # --- Distributed Cache ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - toll-network

  # --- Relational Database ---
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=rodovia
      - POSTGRES_USER=rodovia_user
      - POSTGRES_PASSWORD=rodovia_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - toll-network

  # --- Apache Kafka Messaging ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - toll-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - toll-network

  # --- Observability ---
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - toll-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - toll-network

volumes:
  postgres-data:
  redis-data:
  grafana-data:

networks:
  toll-network:
    driver: bridge
