# Prometheus configuration for Smart Toll Cache System

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'toll-service-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['toll-service-1:8080']

  - job_name: 'toll-service-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['toll-service-2:8080']

  - job_name: 'toll-service-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['toll-service-3:8080']
