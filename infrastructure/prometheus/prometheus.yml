# Prometheus configuration for Smart Toll Cache System

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'rodovia-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['rodovia-1:9080']

  - job_name: 'rodovia-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['rodovia-2:9080']

  - job_name: 'rodovia-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['rodovia-3:9080']
